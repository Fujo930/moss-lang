name: Moss CI

on:
  push:
    branches: [main, ds-Mosslang]
  pull_request:

permissions:
  contents: read

jobs:
  cross-platform:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Moss
        run: python -m pip install -e .
      - name: Unit tests
        run: python -m pytest tests/test_mosslang.py -q --tb=short
      - name: Check locked self-host project
        run: python -m mosslang.cli project-check --locked .
      - name: Check project formatting
        run: python -m mosslang.cli project-format --check .
      - name: Run quick self-host checks
        run: python -m mosslang.cli selfhost --quick
      - name: Check golden output
        run: python -m mosslang.cli golden examples/order.moss
      - name: Trust bundle
        run: python -m mosslang.cli trust examples/order.moss

  full-self-host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Moss
        run: python -m pip install -e .
      - name: Run locked self-host project tests
        run: python -m mosslang.cli project-test --locked .
      - name: Compare host and self-host frontends
        run: python -m mosslang.cli selfhost-compare examples
      - name: Trust-project verification
        run: python -m mosslang.cli trust-project .
      - name: Moss frontend smoke
        run: |
          python -m mosslang.cli tokens --frontend moss examples/order.moss
          python -m mosslang.cli check --frontend moss examples/order.moss
          python -m mosslang.cli compile --frontend moss examples/order.moss
          python -m mosslang.cli run --frontend moss examples/order.moss
